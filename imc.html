<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IMC</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<div id="menu"></div>

<main>
<h1>IMC</h1>

<div class="imc-box">
<input id="peso" placeholder="Peso">
<input id="altura" placeholder="Altura">

<button onclick="calc()">Calcular</button>

<p id="res"></p>
</div>
</main>

<script>
fetch("menu.html").then(r=>r.text()).then(d=>menu.innerHTML=d);

function calc(){
let p=peso.value,a=altura.value;
let imc=p/(a*a);
res.innerHTML="IMC: "+imc.toFixed(2);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMC</title>

<link rel="stylesheet" href="estilos.css">
</head>

<body>

<div id="menu"></div>

<main>

<h1>Calculadora de IMC</h1>

<p>
O IMC (Índice de Massa Corporal) ajuda a identificar se você está no peso ideal.
</p>

<div class="imc-box">

<input id="peso" type="number" placeholder="Peso (kg)">
<input id="altura" type="number" placeholder="Altura (ex: 1.75)">

<button onclick="calcularIMC()">Calcular</button>

<div id="resultado"></div>

</div>

</main>

<script>
function calcularIMC() {
    let peso = parseFloat(document.getElementById("peso").value);
    let altura = parseFloat(document.getElementById("altura").value);
    let resultado = document.getElementById("resultado");

    if (!peso || !altura) {
        resultado.innerHTML = "Preencha corretamente.";
        return;
    }

    let imc = peso / (altura * altura);
    let classificacao = "";

    if (imc < 18.5) classificacao = "Abaixo do peso";
    else if (imc < 24.9) classificacao = "Peso normal";
    else if (imc < 29.9) classificacao = "Sobrepeso";
    else classificacao = "Obesidade";

    resultado.innerHTML =
        "IMC: " + imc.toFixed(2) + "<br>" +
        classificacao;
}
</script>

<script>
fetch("menu.html")
.then(res => res.text())
.then(data => {
    document.getElementById("menu").innerHTML = data;
});
</script>

</body>
</html>

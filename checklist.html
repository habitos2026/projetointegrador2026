<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist</title>

<link rel="stylesheet" href="estilos.css">

<style>
<style>
@keyframes fadeUp {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

.check-container {
    max-width: 500px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 20px;
    animation: fadeUp 0.5s ease;
}

.check-container h1 {
    text-align: center;
}

.progresso {
    text-align: center;
    margin: 15px 0;
    font-weight: bold;
    color: #0f766e;
}

.barra {
    width: 100%;
    height: 10px;
    background: #e5e7eb;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}

.barra span {
    display: block;
    height: 100%;
    width: 0%;
    background: #0f766e;
    transition: 0.3s;
}

.habit-item {
    background: #f8fafc;
    margin-bottom: 10px;
    padding: 12px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: 0.2s;
}

.habit-item:hover {
    transform: translateY(-2px);
}

.text {
    display: flex;
    flex-direction: column;
}
</style>
</style>

</head>

<body>

<div id="menu"></div>

<div class="check-container">

<h1>Checklist Diário</h1>

<input type="date">

<div class="progresso">
Meta: <span id="porcentagem">0%</span>
</div>

<div class="barra">
    <span id="barra"></span>
</div>

<!-- ITENS -->
<div class="habit-item">
<input type="checkbox" onchange="atualizar()">
<label>
<div class="text">
<strong>Beber água</strong>
<small>Saúde física</small>
</div>
</label>
</div>

<div class="habit-item">
<input type="checkbox" onchange="atualizar()">
<label>
<div class="text">
<strong>Exercício</strong>
<small>Corpo</small>
</div>
</label>
</div>

<div class="habit-item">
<input type="checkbox" onchange="atualizar()">
<label>
<div class="text">
<strong>Meditar</strong>
<small>Mente</small>
</div>
</label>
</div>

<div class="habit-item">
<input type="checkbox" onchange="atualizar()">
<label>
<div class="text">
<strong>Alimentação saudável</strong>
<small>Nutrição</small>
</div>
</label>
</div>

</div>

<script>
function atualizar(){
    let checks = document.querySelectorAll("input[type='checkbox']");
    let total = checks.length;
    let marcados = 0;

    checks.forEach(c => {
        if(c.checked) marcados++;
    });

    let porcentagem = Math.round((marcados/total)*100);

    document.getElementById("porcentagem").innerText = porcentagem + "%";
    document.getElementById("barra").style.width = porcentagem + "%";
}
</script>

<script>
fetch("menu.html")
.then(r=>r.text())
.then(d=>menu.innerHTML=d);
</script>

</body>
</html>

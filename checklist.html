<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist</title>

<link rel="stylesheet" href="estilos.css">

<style>
@keyframes fadeUp {
    from {opacity:0; transform:translateY(25px);}
    to {opacity:1; transform:translateY(0);}
}

/* CONTAINER */
.check-container {
    max-width: 520px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    animation: fadeUp 0.6s ease;
}

/* TÍTULO */
.check-container h1 {
    text-align: center;
    color: #0f766e;
}

/* DATA */
.check-container input[type="date"] {
    display: block;
    margin: 15px auto;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* PROGRESSO */
.progresso {
    text-align: center;
    margin: 15px 0;
    font-weight: bold;
    color: #0f766e;
}

/* BARRA */
.barra {
    width: 100%;
    height: 12px;
    background: #e5e7eb;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 25px;
}

.barra span {
    display: block;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #0f766e, #14b8a6);
    transition: 0.4s ease;
}

/* ITENS */
.habit-item {
    background: #f9fafb;
    margin-bottom: 12px;
    padding: 15px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: 0.25s;
    cursor: pointer;
}

.habit-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}

/* CHECK */
.habit-item input {
    width: 18px;
    height: 18px;
    accent-color: #0f766e;
}

/* TEXTO */
.text {
    display: flex;
    flex-direction: column;
}

/* MARCADO */
.habit-item input:checked + label {
    opacity: 0.6;
}

.habit-item input:checked + label strong {
    text-decoration: line-through;
}

/* ANIMAÇÃO EM CASCATA */
.habit-item {
    animation: fadeUp 0.5s ease;
}

.habit-item:nth-child(1) { animation-delay: 0.1s; }
.habit-item:nth-child(2) { animation-delay: 0.2s; }
.habit-item:nth-child(3) { animation-delay: 0.3s; }
.habit-item:nth-child(4) { animation-delay: 0.4s; }
</style>
</head>

<body>

<div id="menu"></div>

<div class="check-container">

<h1>Checklist Diário</h1>

<input type="date" id="data">

<div class="progresso">
Meta: <span id="porcentagem">0%</span>
</div>

<div class="barra">
    <span id="barra"></span>
</div>

<!-- ITENS -->
<div class="habit-item">
    <input type="checkbox" id="h1" onchange="atualizar()">
    <label for="h1">
        <div class="text">
            <strong>Beber 2L de água</strong>
            <small>Saúde física</small>
        </div>
    </label>
</div>

<div class="habit-item">
    <input type="checkbox" id="h2" onchange="atualizar()">
    <label for="h2">
        <div class="text">
            <strong>Praticar exercício</strong>
            <small>Corpo</small>
        </div>
    </label>
</div>

<div class="habit-item">
    <input type="checkbox" id="h3" onchange="atualizar()">
    <label for="h3">
        <div class="text">
            <strong>Meditar</strong>
            <small>Mente</small>
        </div>
    </label>
</div>

<div class="habit-item">
    <input type="checkbox" id="h4" onchange="atualizar()">
    <label for="h4">
        <div class="text">
            <strong>Alimentação saudável</strong>
            <small>Nutrição</small>
        </div>
    </label>
</div>

</div>

<script>
function atualizar(){
    let checks = document.querySelectorAll("input[type='checkbox']");
    let total = checks.length;
    let marcados = 0;

    checks.forEach(c => {
        if(c.checked) marcados++;
    });

    let porcentagem = Math.round((marcados/total)*100);

    document.getElementById("porcentagem").innerText = porcentagem + "%";
    document.getElementById("barra").style.width = porcentagem + "%";
}
</script>

<script>
fetch("menu.html")
.then(r=>r.text())
.then(d=>menu.innerHTML=d);
</script>

</body>
</html>

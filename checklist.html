<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário de Hábitos Saudáveis📝</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>O que conseguiu fazer hoje?</h1>
            <label for="data">Data:</label>
<input type="date" id="data" name="data">
        </header>

        <section class="stats">
            <div class="stat-card">
                <span>Meta Diária</span>
                <strong>75%</strong>
            </div>
            <div class="stat-card">
                <span>Sequência (Streak)</span>
                <strong>12 Dias</strong>
            </div>
        </section>

        <main class="habit-list">
            <h2>Checklist✅</h2>
            
            <div class="habit-item">
                <input type="checkbox" id="habit1">
                <label for="habit1">
                    <span class="icon">💧</span>
                    <div class="text">
                        <strong>Bebi 2L de Água</strong>
                        <small>Saúde física</small>
                    </div>
                </label>
            </div>

            <div class="habit-item">
                <input type="checkbox" id="habit2">
                <label for="habit2">
                    <span class="icon">🧘🏻</span>
                    <div class="text">
                        <strong>Meditei</strong>
                        <small>Saúde mental • 10 min</small>
                    </div>
                </label>
            </div>

            <div class="habit-item">
                <input type="checkbox" id="habit3">
                <label for="habit3">
                    <span class="icon">🍎</span>
                    <div class="text">
                        <strong>Comi uma Fruta</strong>
                        <small>Alimentação</small>
                    </div>
                </label>
             </div>
                 <div class="habit-item">
                <input type="checkbox" id="habit4">
                <label for="habit4">
                    <span class="icon">🥗🥕</span>
                    <div class="text">
                        <strong>Acrescentei legumes/verduras nas minhas refeições</strong>
                        <small>Alimentação</small>
                    </div>
                </label>
            </div>
     </main>
           <button class="add-btn">+ Adicionar Hábito
               
            <div></div>
            <div></div>
            <div></div>
        </button>

        <nav>
            <div class="Acima">
                <h3>Meta Diária</h3>
       
            </div>
      
            <p class="Abaixo"> Hábitos Para Saúde. 2026</p>
        </nav>

    </header>
        
</body>
</html>

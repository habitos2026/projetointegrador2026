<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist de Hábitos</title>

    <link rel="stylesheet" href="estilos.css">
</head>

<body>

<!-- MENU -->
<div id="menu"></div>

<!-- CHECKLIST -->
<div class="check-container">

    <header>
        <h1>O que conseguiu fazer hoje?</h1>

        <label for="data">Data:</label>
        <input type="date" id="data">
    </header>

    <!-- STATUS -->
    <section class="stats">
        <div class="stat-card">
            <span>Meta Diária</span>
            <strong id="meta">0%</strong>
        </div>

        <div class="stat-card">
            <span>Sequência</span>
            <strong>12 dias</strong>
        </div>
    </section>

    <!-- LISTA -->
    <section class="habit-list">
        <h2>Checklist ✅</h2>

        <div class="habit-item">
            <input type="checkbox" id="h1" onchange="atualizar()">
            <label for="h1">
                <span class="icon">💧</span>
                <div class="text">
                    <strong>Bebi 2L de água</strong>
                    <small>Saúde física</small>
                </div>
            </label>
        </div>

        <div class="habit-item">
            <input type="checkbox" id="h2" onchange="atualizar()">
            <label for="h2">
                <span class="icon">🧘</span>
                <div class="text">
                    <strong>Meditei</strong>
                    <small>Saúde mental</small>
                </div>
            </label>
        </div>

        <div class="habit-item">
            <input type="checkbox" id="h3" onchange="atualizar()">
            <label for="h3">
                <span class="icon">🍎</span>
                <div class="text">
                    <strong>Comi fruta</strong>
                    <small>Alimentação</small>
                </div>
            </label>
        </div>

        <div class="habit-item">
            <input type="checkbox" id="h4" onchange="atualizar()">
            <label for="h4">
                <span class="icon">🥗</span>
                <div class="text">
                    <strong>Comi verduras</strong>
                    <small>Alimentação</small>
                </div>
            </label>
        </div>

    </section>

    <button class="add-btn">+ Adicionar Hábito</button>

</div>

<!-- MENU SCRIPT -->
<script>
fetch("menu.html")
.then(res => res.text())
.then(data => {
    document.getElementById("menu").innerHTML = data;
});
</script>

<!-- SCRIPT DO CHECKLIST -->
<script>
function atualizar() {
    let checks = document.querySelectorAll(".habit-item input");
    let marcados = 0;

    checks.forEach(c => {
        if (c.checked) marcados++;
    });

    let total = checks.length;
    let porcentagem = Math.round((marcados / total) * 100);

    document.getElementById("meta").innerText = porcentagem + "%";
}
</script>

</body>
</html>

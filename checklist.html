<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário de Hábitos Saudáveis📝</title>
    <link rel="stylesheet" href="estilos.css">
<style>
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

main {
    animation: fadeUp 0.6s ease;
}

h1, h2, p {
    animation: fadeUp 0.8s ease;
}

.frase {
    font-weight: bold;
    color: #0f766e;
    text-align: center;
    margin-top: 20px;
    animation: fadeUp 1s ease;
}

.habit-item {
    transition: 0.25s ease;
}

.habit-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.habit-item input:checked + label {
    opacity: 0.6;
}

.habit-item input:checked + label strong {
    text-decoration: line-through;
}
</style>

</head>

<body>

<!-- MENU NO TOPO -->
<div id="menu"></div>

<div class="container">
    <header>
        <h1>O que conseguiu fazer hoje?</h1>

        <label for="data">Data:</label>
        <input type="date" id="data" name="data">
    </header>

    <section class="stats">
        <div class="stat-card">
            <span>Meta Diária</span>
            <strong>75%</strong>
        </div>
        <div class="stat-card">
            <span>Sequência (Streak)</span>
            <strong>12 Dias</strong>
        </div>
    </section>

    <main class="habit-list">
        <h2>Checklist✅</h2>
        
        <div class="habit-item">
            <input type="checkbox" id="habit1">
            <label for="habit1">
                <span class="icon">💧</span>
                <div class="text">
                    <strong>Bebi 2L de Água</strong>
                    <small>Saúde física</small>
                </div>
            </label>
        </div>

        <div class="habit-item">
            <input type="checkbox" id="habit2">
            <label for="habit2">
                <span class="icon">🧘🏻</span>
                <div class="text">
                    <strong>Meditei</strong>
                    <small>Saúde mental • 10 min</small>
                </div>
            </label>
        </div>

        <div class="habit-item">
            <input type="checkbox" id="habit3">
            <label for="habit3">
                <span class="icon">🍎</span>
                <div class="text">
                    <strong>Comi uma Fruta</strong>
                    <small>Alimentação</small>
                </div>
            </label>
        </div>

        <div class="habit-item">
            <input type="checkbox" id="habit4">
            <label for="habit4">
                <span class="icon">🥗🥕</span>
                <div class="text">
                    <strong>Acrescentei legumes/verduras nas minhas refeições</strong>
                    <small>Alimentação</small>
                </div>
            </label>
        </div>
    </main>

    <button class="add-btn">+ Adicionar Hábito</button>

    <nav>
        <div class="Acima">
            <h3>Meta Diária</h3>
        </div>
        <p class="Abaixo"> Hábitos Para Saúde. 2026</p>
    </nav>

</div>

<!-- SCRIPT DO MENU -->
<script>
fetch("menu.html")
.then(res => res.text())
.then(data => {
    document.getElementById("menu").innerHTML = data;
});
</script>

</body>
</html>
